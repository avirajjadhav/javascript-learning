<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>javascript events</title>
  </head>
  <body>
    <button onclick="myFun()">Click me</button>
    <p id="gfg"></p>

    <!-- mouseover event -->
    <h2>mouseover event</h2>
    <p onmouseover="action()">computer application portal</p>

    <!-- onmouseout event -->
    <h2>onmouseout event</h2>
    <p onmouseout="msoutaction()">computer science portal</p>

    <h2>onkeydown Event</h2>
    <input
      type="text"
      id="inputfield"
      style="background-color: rgb(187, 212, 235)"
    />
    <h2>onkeypress event </h2>
   <input type="text" onkeypress="myfun2()">
   

    <h2>onchange Event Attribute</h2>
    <p>choose car</p>

    <select id="cars" onchange="Displaycar()">
      <option value="volvo">Volvo</option>
      <option value="BMW">BMW</option>
      <option value="Creata">Creata</option>
      <option value="audi">Audi</option>
    </select>
    <p id="displayvalue"></p>
    <h2>The oninput Event</h2>
    <input type="text" id="myInput" oninput="myFunction()" />

    <p id="demo"></p>

    <form action="" id="myform">
      Enter Your Name:
      <input type="text" id="fname" />
      <input type="submit" />
    </form>

    <h2>Focus Event Example</h2>
    <input type="text" id="username" placeholder="Enter your name" />

    <h2>The blur Event</h2>
    <input type="text" id="blurevent">

    <script>
      function myFun() {
  document.getElementById("gfg").innerHTML = Date();
  document.getElementById("gfg").style.background = "cyan";
}
function action(){
 alert("mouse move over");
}
function msoutaction(){
  alert("mouse move out");
}

document.getElementById("inputfield").addEventListener("keypress",keydownAction);
function keydownAction() {
  document.getElementById("inputfield").style.backgroundColor = "orange";
}

function myfun2() {
  alert("You pressed a key inside the input field");
}



 function Displaycar(){
    let x=document.getElementById("cars").value;
    document.getElementById('displayvalue').innerHTML=" selected Car : " + x;

  }
  function myFunction() {
  let text = document.getElementById("myInput").value;
  document.getElementById("demo").innerHTML = "You write: " + text;
}

window.addEventListener("load", function () {
    alert("Page Loaded Successfully!");
});

const form = document.getElementById("myform");

form.addEventListener("submit", function(event) {

    event.preventDefault();

    alert("Form Submitted Successfully!");

});

const input = document.getElementById("username");

input.addEventListener("focus", Myfocus); 
function Myfocus() {
  document.getElementById("username").style.backgroundColor = "yellow";
}

document.getElementById("blurevent").addEventListener("blur", myFunction1);

function myFunction1() {
  alert("Input field lost focus.");
}
    </script>

    <!-- <script src="event.js"></script> -->
  </body>
</html>
