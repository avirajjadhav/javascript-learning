<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 id="title" class="heading">DOM Learning <span style="display: none;">test text</span>
    </h1>

    <div class="parent">
      <div class="day">Sunday</div>
      <div class="day">Monday</div>
      <div class="day">Tuesday</div>
      <div class="day">Wednesday</div>
    </div>
  </body>
  <h2>The nextElementSibling Property</h2>

<ul>
  <li id="item1">TV (first item)</li>
  <li id="item2">MOBILE (second item)</li>
</ul>
<p id="demo"></p>
  <script>
   const parent= document.querySelector('.parent')
  //  console.log(parent);
  //  console.log(parent.children);
  //  console.log(parent.children[1].innerHTML);

  for (let i = 0; i < parent.children.length; i++) {
     console.log(parent.children[i].innerHTML);
    
  }
  parent.children[1].style.color='red'

  console.log(parent.firstElementChild);
  console.log(parent.lastElementChild);

  const dayone=document.querySelector('.day')
  console.log(dayone);
  console.log(dayone.parentElement);
  console.log(dayone.nextElementSibling);

let text = document.getElementById("item1").nextElementSibling.innerHTML; 
document.getElementById("demo").innerHTML = text;
  </script>
</html>
