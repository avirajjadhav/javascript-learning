<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Or Remove DOM</title>
</head>
<body>
    <ul class="language">
    <li>Html</li>
    </ul>
</body>
<script>
    function addLanguage(langname){
        const li=document.createElement('li');
        li.innerHTML=`${langname}`;
        document.querySelector('.language').appendChild(li)


    }
    addLanguage("css")

    function AddOptLanguage(langname){
     const li=document.createElement('li');
     li.append(document.createTextNode(langname));
     document.querySelector('.language').appendChild(li);
    }
AddOptLanguage('javascript')

function addLanguage(language) {
    const li = document.createElement("li"); // Create <li>
    li.textContent = language;               // Add text inside <li>
    document.querySelector(".language").appendChild(li); // Add <li> to <ul>
}
addLanguage("Python");
addLanguage("React");

//edit
const firstlang=document.querySelector("li:nth-child(1)")
const newli=document.createElement('li')
newli.textContent="java"
firstlang.replaceWith(newli);

const lastlang=document.querySelector("li:nth-child(5)");
lastlang.remove()
</script>
</html>
